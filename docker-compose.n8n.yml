version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=UTC
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./:/workspace
    working_dir: /workspace

